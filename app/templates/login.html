{% extends "base.html" %}
{% block content %}
<section class="login-page">
  <article>
    <h1>Local access</h1>
    <p>Sign in to your self-hosted Job-Hunter workspace.</p>
    <form method="post" action="/login">
      <label>Username <input name="username" autocomplete="username" required></label>
      <label>Password <input name="password" type="password" autocomplete="current-password" required></label>
      <button type="submit">Sign in</button>
    </form>
  </article>
  <article>
    <h2>First-time setup</h2>
    <p>Create the sole local account once. Passwords must contain at least 12 characters.</p>
    <form method="post" action="/login/bootstrap">
      <label>Username <input name="username" autocomplete="username" required></label>
      <label>Password <input name="password" type="password" autocomplete="new-password" required></label>
      <button type="submit" class="secondary">Create account</button>
    </form>
  </article>
</section>
{% endblock %}
