{% if schedule_form_error %}<p class="form-error" role="alert">{{ schedule_form_error }}</p>{% endif %}
<form method="post" action="/searches/{{ search_id }}/schedules" class="search-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <label>Schedule name <input name="name" value="{{ schedule_form_values.name }}" required maxlength="150"></label>
  <label>Trigger <select name="trigger_type"><option value="daily" {% if schedule_form_values.trigger_type == 'daily' %}selected{% endif %}>Daily</option><option value="cron" {% if schedule_form_values.trigger_type == 'cron' %}selected{% endif %}>Cron</option></select></label>
  <label>Daily time <input type="time" name="daily_time" value="{{ schedule_form_values.daily_time }}"></label>
  <label>Cron expression <input name="cron_expression" value="{{ schedule_form_values.cron_expression }}" maxlength="100" placeholder="0 8 * * 1-5"></label>
  <label class="checkbox-label"><input type="checkbox" name="enabled" value="true" {% if schedule_form_values.enabled %}checked{% endif %}> Enabled</label>
  <label class="checkbox-label"><input type="checkbox" name="incremental" value="true" {% if schedule_form_values.incremental %}checked{% endif %}> Incremental</label>
  <label>Retries <input type="number" name="retry_limit" value="{{ schedule_form_values.retry_limit }}" min="0" max="3"></label>
  <button type="submit">Save schedule</button>
</form>
